name: Feature request
description: Suggest an improvement to wfkit
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        Good feature requests explain the problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve
      placeholder: It's hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like to happen
      placeholder: wfkit should...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      placeholder: Right now the workaround is...
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add examples, screenshots, terminal output, or links if they help explain the request.
