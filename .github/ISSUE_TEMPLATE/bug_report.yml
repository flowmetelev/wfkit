name: Bug report
description: Report a reproducible bug in wfkit
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Please include enough detail that someone else can reproduce the problem without guessing.
  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: Describe the bug clearly and directly.
      placeholder: wfkit migrate fails after build when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce it
      description: List the exact steps.
      placeholder: |
        1. Run `wfkit migrate`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: The command should...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste the command output, stack trace, or screenshots if useful.
      render: shell
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: project
    attributes:
      label: Project context
      description: Anything useful about the setup, repo structure, package manager, or Webflow workflow.
